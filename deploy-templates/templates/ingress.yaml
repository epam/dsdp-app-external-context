{{- if and (.Values.ingress.enabled) (eq .Values.global.deploymentMode "development") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "application-external-context.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "application-external-context.labels" . | nindent 4 }}
spec:
  {{- if .Values.ingress.ingressClassName }}
  ingressClassName: {{ .Values.ingress.ingressClassName }}
  {{- end }}
  rules:
    - host: {{ printf "%s-%s.%s" .Release.Name .Release.Namespace .Values.dnsWildcard }}
      http:
        paths:
          - path: /v1alpha
            pathType: Prefix
            backend:
              service:
                name: {{ include "application-external-context.name" . }}
                port:
                  name: api
{{- end }}
