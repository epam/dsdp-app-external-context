apiVersion: v1
kind: Secret
metadata:
  name:  app-context-mongo-app-secrets
type: Opaque
stringData:
  host: "app-context-mongodb:27017"
  applicationExternalContextSvcName: "admin"
  applicationExternalContextSvcPass: "admin"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-context-mongodb-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-context-mongodb-init-script
data:
  mongo-init.js: |
    db.createUser(
        {
            user: "admin",
            pwd: "admin",
            roles: [
                { role: "dbAdmin", db: "app_context" },
                { role: "readWrite", db: "app_context" }
            ]
        }
    );
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-context-mongodb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: app-context-mongodb
  template:
    metadata:
      labels:
        app: app-context-mongodb
    spec:
      restartPolicy: Always
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: admin
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: admin
            - name: MONGO_INITDB_DATABASE
              value: app_context
          volumeMounts:
            - name: app-context-mongodb-storage
              mountPath: /data/db
            - name: app-context-mongodb-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          livenessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - -u
                - admin
                - -p
                - admin
                - --authenticationDatabase
                - app_context
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - -u
                - admin
                - -p
                - admin
                - --authenticationDatabase
                - app_context
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  mongosh --quiet --eval "db.adminCommand('ping')" || \
                  mongosh --quiet -u admin -p admin --authenticationDatabase app_context --eval "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: app-context-mongodb-storage
          persistentVolumeClaim:
            claimName: app-context-mongodb-pvc
        - name: app-context-mongodb-init
          configMap:
            name: app-context-mongodb-init-script

---
apiVersion: v1
kind: Service
metadata:
  name: app-context-mongodb
spec:
  type: ClusterIP
  ports:
    - port: 27017
      targetPort: 27017
      protocol: TCP
  selector:
    app: app-context-mongodb
